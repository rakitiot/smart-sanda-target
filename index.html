<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sanda | Dashboard Kendali Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="wrapper">
    <div class="card header">
        <div class="header-titles">
            <h1>SMART SANDA TARGET</h1>
            <small style="color: var(--dim)">Sistem Pantau Performa Latihan Real-Time</small>
        </div>
        <div class="controls">
            <div class="timer-display" id="timer">00:00</div>
            <button class="btn btn-start" id="startBtn">MULAI</button>
            <button class="btn btn-pause" id="pauseBtn">PAUSE</button>
            <button class="btn btn-reset" id="resetBtn">RESET</button>
            <button class="btn btn-reset" style="background:#22c55e" id="downloadBtn">UNDUH DATA</button>
        </div>
    </div>

    <div class="score-box">
        <div class="card score-card">
            <small>SKOR DAMPAK</small>
            <span class="val" id="impactVal" style="color: var(--danger);">0</span>
        </div>
        <div class="card score-card">
            <small>SKOR KECEPATAN</small>
            <span class="val" id="speedVal" style="color: #00ff88;">0</span>
        </div>
    </div>

    <div class="card stats-box">
        <div class="stat-item"><small>Total Tendangan</small><b id="tKick">0</b></div>
        <div class="stat-item"><small>Rata-rata Power</small><b id="aPower">0</b></div>
        <div class="stat-item"><small>Power Maksimal</small><b id="mPower">0</b></div>
        <div class="stat-item"><small>Status Koneksi</small><b style="color: #00ff88;">SIMULASI</b></div>
    </div>

    <div class="card body-visual">
        <h3 style="margin:15px; color:var(--text)">VISUALISASI TARGET 12 TITIK</h3>
        
        <div class="target-container">
            <div class="target-front">
                <div id="point-1" class="highlight-point"></div>
                <div id="point-2" class="highlight-point"></div>
                <div id="point-3" class="highlight-point"></div>
                <div id="point-4" class="highlight-point"></div>
                <div id="point-5" class="highlight-point"></div>
                <div id="point-6" class="highlight-point"></div>
                <div id="point-7" class="highlight-point"></div>
                <div id="point-8" class="highlight-point"></div>
            </div>

            <div class="target-back">
                <div id="point-back-1" class="highlight-point"></div>
                <div id="point-back-2" class="highlight-point"></div>
                <div id="point-back-3" class="highlight-point"></div>
                <div id="point-back-4" class="highlight-point"></div>
            </div>
        </div>
        
        <p id="zoneText" style="color:var(--accent); font-weight:bold; margin-top:10px; margin-bottom:10px;">Siap Menerima Data...</p>
    </div>

    <div class="card chart-box">
        <canvas id="liveChart"></canvas>
    </div>

    <div class="footer">
        UNNES © 2026 | SMART SANDA TARGET

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
